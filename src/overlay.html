<!doctype html>
<!-- Recording/pipeline indicator overlay. Shown by the Rust shell (window
     label "overlay") from hotkey press until the dictated text has been
     injected. Stages: "recording" (animated waveform) → "transcribing" →
     "polishing" (status text) → "copied" (terminal "Copied — ⌘V to paste",
     shown when injection is diverted to the clipboard), driven by overlay.rs
     via window.eval of
     __scrivaStage() — no Tauri API usage here, so no capability grants.
     Click-through + non-focusable is enforced on the Rust side. Always
     dark — it floats over arbitrary content, not over our UI. -->
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: transparent;
    overflow: hidden;
    -webkit-user-select: none;
    cursor: default;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pill {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 40px;
    padding: 0 18px;
    border-radius: 20px;
    background: rgba(28, 28, 30, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.14);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
  }
  /* The Scriva logo waveform (same path as scriva-icon.svg), stretched to
     pill proportions; non-scaling-stroke keeps the line weight uniform. */
  .wave {
    width: 64px;
    height: 24px;
    overflow: visible;
  }
  .wave path {
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-width: 2.5px;
    vector-effect: non-scaling-stroke;
  }
  .wave .base {
    stroke: rgba(126, 124, 245, 0.35);
  }
  /* Decorative pulse traveling along the waveform — not driven by real
     mic levels. pathLength=100 normalizes the dash units. */
  .wave .pulse {
    stroke: #8a88ff;
    stroke-dasharray: 28 72;
    filter: drop-shadow(0 0 3px rgba(138, 136, 255, 0.8));
    animation: travel 1.5s linear infinite;
  }
  @keyframes travel {
    from { stroke-dashoffset: 0; }
    to   { stroke-dashoffset: -100; }
  }
  /* Post-release pipeline stages: waveform swaps for pulsing status text. */
  .stage {
    display: none;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .01em;
    color: #e8e8ee;
    white-space: nowrap;
    animation: stage-pulse 1.2s ease-in-out infinite;
  }
  @keyframes stage-pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: .45; }
  }
  body[data-stage="transcribing"] .wave,
  body[data-stage="polishing"] .wave,
  body[data-stage="copied"] .wave { display: none; }
  body[data-stage="transcribing"] .stage,
  body[data-stage="polishing"] .stage,
  body[data-stage="copied"] .stage { display: inline; }
  /* "copied" is a terminal state — hold it steady, don't pulse. */
  body[data-stage="copied"] .stage { animation: none; }
</style>
</head>
<body>
  <div class="pill">
    <svg class="wave" viewBox="14 22 100 78" preserveAspectRatio="none" aria-hidden="true">
      <path class="base"  d="M 14 64 L 24 64 L 30 56 L 36 76 L 44 42 L 52 90 L 62 22 L 72 100 L 80 40 L 88 80 L 94 56 L 100 64 L 114 64" pathLength="100"></path>
      <path class="pulse" d="M 14 64 L 24 64 L 30 56 L 36 76 L 44 42 L 52 90 L 62 22 L 72 100 L 80 40 L 88 80 L 94 56 L 100 64 L 114 64" pathLength="100"></path>
    </svg>
    <span class="stage" id="stage"></span>
  </div>
<script>
  // Called by the Rust shell (overlay.rs set_stage) via window.eval.
  window.__scrivaStage = function (s) {
    document.body.setAttribute('data-stage', s);
    var text = {
      transcribing: 'Transcribing',
      polishing: 'Polishing',
      copied: 'Copied — ⌘V to paste',
    }[s];
    document.getElementById('stage').textContent = text || '';
  };
</script>
</body>
</html>
